    <section id="user-signup">
        <h2 id="user-reg-status" class="confirmation-status"></h2>

        <form class="user-signup" id="user-reg-form">
            <h2>Register</h2>

            <div class="input">
                <label for="name">Name</label>
                <input type="text" id="username" name="name" placeholder="Enter your name..." required>
            </div>

            <div class="input">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email..." required>
            </div>

            <div class="input">
                <label for="password">Password</label>
                <input type="text" id="password" name="password" placeholder="Enter your password..." required>
            </div>


            <button type="submit">Sign Up</button>

            <p>Already a user ?</p>
            <a href="login.html">Login</a>
        </form>

    </section>


    <footer class="footer">
        <div class="footer-container">

            <div class="footer-brand">
                <h3>F HEENA Boutique</h3>
                <p>Timeless fashion for modern women.</p>

            <div class="footer-contact">
